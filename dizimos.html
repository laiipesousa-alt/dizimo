<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dízimos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f4f6f8; }
    nav { background: #1a237e; color: white; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
    nav .logo { font-size: 18px; font-weight: 500; }
    nav ul { list-style: none; display: flex; gap: 20px; }
    nav ul li a { color: white; text-decoration: none; font-size: 14px; }
    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    h2 { color: #1a237e; margin-bottom: 20px; }
    form.busca { display: flex; gap: 10px; margin-bottom: 24px; }
    form.busca input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; flex: 1; font-size: 14px; }
    form.busca button { padding: 8px 18px; background: #1a237e; color: white; border: none; border-radius: 6px; cursor: pointer; }
    form.novo { background: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    form.novo input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; flex: 1; min-width: 140px; }
    form.novo label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
    form.novo button { padding: 8px 20px; background: #2e7d32; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    table { width: 100%; background: white; border-radius: 10px; border-collapse: collapse; overflow: hidden; }
    th { background: #1a237e; color: white; padding: 12px; text-align: left; font-size: 13px; }
    td { padding: 11px 12px; font-size: 14px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    a.deletar { color: #c62828; text-decoration: none; font-size: 13px; }
    a.deletar:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <div class="logo">⛪ Igreja</div>
  <ul>
    <li><a href="/">Dashboard</a></li>
    <li><a href="dizimo.html">Dízimos</a></li>
    <li><a href="gastos.html">Gastos</a></li>
  </ul>
</nav>

<div class="container">
  <h2>Dízimos</h2>

  <!-- Busca -->
  <form class="busca" method="get" action="/dizimos">
    <input type="text" name="busca" placeholder="Buscar por nome do membro..." />
    <button type="submit">Buscar</button>
  </form>

  <!-- Formulário novo dízimo -->
  <form class="novo" method="post" action="/dizimos/salvar" th:object="${novoDizimo}">
    <div>
      <label>Nome do Membro</label>
      <input type="text" th:field="*{nomeMembro}" placeholder="Nome" required />
    </div>
    <div>
      <label>Valor (R$)</label>
      <input type="number" step="0.01" th:field="*{valor}" placeholder="0,00" required />
    </div>
    <div>
      <label>Data</label>
      <input type="date" th:field="*{data}" required />
    </div>
    <button type="submit">+ Registrar</button>
  </form>

  <!-- Tabela -->
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Valor</th>
        <th>Data</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="d : ${dizimos}">
        <td th:text="${d.nomeMembro}"></td>
        <td>R$ <span th:text="${#numbers.formatDecimal(d.valor, 1, 2)}"></span></td>
        <td th:text="${d.data}"></td>
        <td><a class="deletar" th:href="@{/dizimos/deletar/{id}(id=${d.id})}">Remover</a></td>
      </tr>
    </tbody>
  </table>
  
  
</div>

</body>
</html>
